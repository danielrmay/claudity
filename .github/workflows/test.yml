name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: "Tier 1: deterministic tests (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest gives the Python layer (incl. the MCP server, which
        # the protocol tests spawn as a real subprocess) empirical Windows
        # coverage. Do NOT set PYTHONUTF8 here: Windows' cp1252 default is
        # exactly what the unicode round-trip tests must run under.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pytest pyyaml
      - run: pytest tests/ -q
      - name: Vendored-fidelity audit (every deviation traces to a PORTING rule)
        if: matrix.os == 'ubuntu-latest'
        run: python3 scripts/upstream_audit.py

  plugin-validate:
    name: "Tier 0: plugin manifest + inventory"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate plugin and marketplace manifests
        run: claude plugin validate .
      - name: Component inventory loads
        run: claude --plugin-dir . plugin details claudity
