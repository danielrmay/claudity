name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: "Tier 1: deterministic tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest tests/ -q

  plugin-validate:
    name: "Tier 0: plugin manifest + inventory"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate plugin and marketplace manifests
        run: claude plugin validate .
      - name: Component inventory loads
        # May require auth in some CLI versions; inventory is also asserted
        # by the pytest job when claude is available locally.
        continue-on-error: true
        run: claude --plugin-dir . plugin details claudity
