name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: "Tier 1: deterministic tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pytest pyyaml
      - run: pytest tests/ -q
      - name: Vendored-fidelity audit (every deviation traces to a PORTING rule)
        run: python3 scripts/upstream_audit.py

  plugin-validate:
    name: "Tier 0: plugin manifest + inventory"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate plugin and marketplace manifests
        run: claude plugin validate .
      - name: Component inventory loads
        run: claude --plugin-dir . plugin details claudity
